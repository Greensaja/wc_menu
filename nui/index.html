<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>wc_menu</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" crossorigin="anonymous">
    <link rel="stylesheet" href="css/app.css?v=22">
    <link rel="stylesheet" href="css/components.css?v=20">
    <link rel="stylesheet" href="css/animations.css?v=10">
</head>
<body>
    <div id="wc-root" class="wc-hidden">
        <!-- Title cartouche (separate ornamental banner) -->
        <div id="wc-cartouche" class="wc-cartouche"></div>

        <!-- Main menu panel -->
        <div id="wc-panel" class="wc-panel">
            <div id="wc-frame" class="wc-frame"></div>
            <div id="wc-content" class="wc-content"></div>
        </div>
    </div>

    <!-- Floating hints (outside the panel, bottom-right of screen) -->
    <div id="wc-hints" class="wc-hints wc-hidden"></div>

    <!-- Toast notification stack (bottom-center, always visible) -->
    <div id="wc-toast-container" class="wc-toast-container"></div>

    <script src="js/nui.js?v=11"></script>
    <script src="js/sound.js?v=11"></script>
    <script src="js/components.js?v=17"></script>
    <script src="js/menu.js?v=28"></script>
    <script src="js/app.js?v=12"></script>
</body>
</html>
